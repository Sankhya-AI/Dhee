services:
  dhee:
    build: .
    container_name: dhee
    volumes:
      - dhee-data:/data/dhee
    environment:
      - DHEE_DATA_DIR=/data/dhee
      # Optional provider credentials. NVIDIA-compatible OpenAI is the
      # recommended high-quality semantic memory path.
      - NVIDIA_API_KEY=${NVIDIA_API_KEY:-}
      - NVIDIA_BASE_URL=${NVIDIA_BASE_URL:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import dhee; print(dhee.__version__)"]
      interval: 30s
      timeout: 10s
      retries: 3
    # MCP server (4 tools) — connect via stdio
    command: ["dhee-mcp"]

volumes:
  dhee-data:
    driver: local
