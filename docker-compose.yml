services:
  dhee:
    build: .
    container_name: dhee
    volumes:
      - dhee-data:/data/dhee
    environment:
      - DHEE_DATA_DIR=/data/dhee
      # Set ONE of these:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "from dhee import Dhee; print('ok')"]
      interval: 30s
      timeout: 10s
      retries: 3
    # MCP server (4 tools) — connect via stdio
    command: ["dhee-mcp"]

volumes:
  dhee-data:
    driver: local
