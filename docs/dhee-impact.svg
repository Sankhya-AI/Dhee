<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 620" role="img" aria-labelledby="title desc">
  <title id="title">Dhee repo impact map</title>
  <desc id="desc">Sketch map answering what breaks if a coding agent touches a file.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2 2 L10 6 L2 10" fill="none" stroke="#22272e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .paper { fill: #fffaf0; }
      .ink { stroke: #22272e; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; fill: none; }
      .thin { stroke: #22272e; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; fill: none; }
      .arrow { marker-end: url(#arrow); }
      .title { font: 700 44px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #22272e; }
      .label { font: 700 25px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #22272e; }
      .small { font: 500 18px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #49515b; }
      .tiny { font: 700 16px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #49515b; }
    </style>
  </defs>

  <rect class="paper" width="1500" height="620"/>
  <text class="title" x="64" y="78">"If I touch this file, what breaks?"</text>
  <path class="thin" opacity=".14" d="M62 104 C260 78 449 113 628 93 C836 70 1004 112 1190 88 C1312 72 1410 84 1454 68"/>

  <g transform="translate(596 225)">
