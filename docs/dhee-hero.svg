<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 640" role="img" aria-labelledby="title desc">
  <title id="title">Dhee local developer brain</title>
  <desc id="desc">Excalidraw style diagram showing Dhee between coding agents, repo cognition, memory, and verification.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2 2 L10 6 L2 10" fill="none" stroke="#1f2328" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .paper { fill: #fff9ed; }
      .ink { stroke: #1f2328; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; fill: none; }
      .thin { stroke: #1f2328; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; fill: none; }
      .dash { stroke-dasharray: 8 9; }
      .arrow { marker-end: url(#arrow); }
      .title { font: 700 76px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #1f2328; }
      .subtitle { font: 500 28px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #3f454c; }
      .label { font: 700 27px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #1f2328; }
      .small { font: 500 20px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #3f454c; }
      .tiny { font: 600 17px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #4d535b; }
    </style>
  </defs>

