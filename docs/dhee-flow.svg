<svg width="1400" height="560" viewBox="0 0 1400 560" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Dhee flow chart</title>
  <desc id="desc">Dhee compiles evidence, supervises actions, verifies outcomes, and stores surviving lessons.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1400" y2="560" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FAF6EE"/>
      <stop offset="1" stop-color="#ECF7F5"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="13" flood-color="#17201F" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2 2L10 6L2 10" fill="none" stroke="#5F625D" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="1400" height="560" rx="30" fill="url(#bg)"/>
  <g opacity="0.28">
    <path d="M84 102H1316" stroke="#2A2A27" stroke-opacity="0.16"/>
    <path d="M84 282H1316" stroke="#2A2A27" stroke-opacity="0.16"/>
    <path d="M84 462H1316" stroke="#2A2A27" stroke-opacity="0.16"/>
    <path d="M230 70V494" stroke="#2A2A27" stroke-opacity="0.1"/>
    <path d="M700 70V494" stroke="#2A2A27" stroke-opacity="0.1"/>
    <path d="M1170 70V494" stroke="#2A2A27" stroke-opacity="0.1"/>
  </g>

  <text x="700" y="68" text-anchor="middle" fill="#1F1B16" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="34" font-weight="800">How Dhee turns work into action context</text>

  <g filter="url(#shadow)" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <g transform="translate(70 152)">
      <rect width="196" height="152" rx="24" fill="#FFFFFF" stroke="#E4DED3"/>
      <text x="98" y="43" text-anchor="middle" fill="#8C4626" font-size="14" font-weight="900" letter-spacing="1.6">INPUTS</text>
      <text x="98" y="78" text-anchor="middle" fill="#1F1B16" font-size="22" font-weight="800">Messy reality</text>
      <text x="98" y="110" text-anchor="middle" fill="#625B50" font-size="15">files, tests, chats,</text>
      <text x="98" y="132" text-anchor="middle" fill="#625B50" font-size="15">screens, agents</text>
    </g>

    <g transform="translate(330 152)">
      <rect width="196" height="152" rx="24" fill="#1F1B16"/>
      <text x="98" y="43" text-anchor="middle" fill="#F5C15C" font-size="14" font-weight="900" letter-spacing="1.6">COMPILE</text>
      <text x="98" y="78" text-anchor="middle" fill="#FFF7EB" font-size="22" font-weight="800">Task contract</text>
      <text x="98" y="110" text-anchor="middle" fill="#E3D4C2" font-size="15">goal, files, budget,</text>
      <text x="98" y="132" text-anchor="middle" fill="#E3D4C2" font-size="15">tests, constraints</text>
    </g>

    <g transform="translate(590 152)">
      <rect width="220" height="152" rx="24" fill="#FFFFFF" stroke="#E4DED3"/>
      <text x="110" y="43" text-anchor="middle" fill="#8C4626" font-size="14" font-weight="900" letter-spacing="1.6">SUPERVISE</text>
      <text x="110" y="78" text-anchor="middle" fill="#1F1B16" font-size="22" font-weight="800">Allowed actions</text>
      <text x="110" y="110" text-anchor="middle" fill="#625B50" font-size="15">read, search, edit,</text>
      <text x="110" y="132" text-anchor="middle" fill="#625B50" font-size="15">test, submit</text>
    </g>

    <g transform="translate(874 152)">
      <rect width="196" height="152" rx="24" fill="#0E3B3A"/>
      <text x="98" y="43" text-anchor="middle" fill="#4DC6B7" font-size="14" font-weight="900" letter-spacing="1.6">VERIFY</text>
      <text x="98" y="78" text-anchor="middle" fill="#F4FFFC" font-size="22" font-weight="800">Proof bundle</text>
      <text x="98" y="110" text-anchor="middle" fill="#CFEBE6" font-size="15">tests, diffs, trace,</text>
      <text x="98" y="132" text-anchor="middle" fill="#CFEBE6" font-size="15">contamination</text>
    </g>

    <g transform="translate(1134 152)">
      <rect width="196" height="152" rx="24" fill="#FFFFFF" stroke="#E4DED3"/>
      <text x="98" y="43" text-anchor="middle" fill="#8C4626" font-size="14" font-weight="900" letter-spacing="1.6">REMEMBER</text>
      <text x="98" y="78" text-anchor="middle" fill="#1F1B16" font-size="22" font-weight="800">Scene cards</text>
      <text x="98" y="110" text-anchor="middle" fill="#625B50" font-size="15">lessons survive,</text>
      <text x="98" y="132" text-anchor="middle" fill="#625B50" font-size="15">noise expires</text>
    </g>
  </g>

  <g stroke="#5F625D" stroke-width="3" marker-end="url(#arrow)">
    <path d="M280 228H316"/>
    <path d="M540 228H576"/>
    <path d="M824 228H860"/>
    <path d="M1084 228H1120"/>
  </g>

  <g font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <rect x="210" y="374" width="980" height="84" rx="24" fill="#FFFFFF" stroke="#E4DED3"/>
    <text x="700" y="409" text-anchor="middle" fill="#1F1B16" font-size="21" font-weight="800">The agent sees a small, current, auditable packet.</text>
    <text x="700" y="439" text-anchor="middle" fill="#625B50" font-size="16">Raw evidence stays behind pointers until a contract or verifier needs it.</text>
  </g>
</svg>
