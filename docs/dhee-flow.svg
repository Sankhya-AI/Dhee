    <text class="label" x="74" y="56">Verify</text>
    <text class="small" x="35" y="97">tests, diffs, release gate</text>
    <text class="small" x="35" y="126">why this patch is safe</text>
    <text class="small" x="35" y="155">what still needs review</text>
  </g>

