    <text class="label" x="74" y="56">Dhee packet</text>
    <text class="small" x="35" y="97">handoff + memories</text>
    <text class="small" x="35" y="126">repo brain localization</text>
    <text class="small" x="35" y="155">risk + proof obligations</text>
  </g>

  <g transform="translate(748 182)">
    <path d="M10 8 C72 -4 176 0 240 10 C264 13 279 31 277 57 C274 97 282 129 257 148 C220 174 64 160 25 149 C4 142 -4 117 3 90 C11 57 -11 25 10 8 Z" fill="#e6dcff"/>
