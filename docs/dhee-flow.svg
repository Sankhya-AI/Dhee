    <text class="label" x="69" y="52">Agent edits</text>
    <text class="small" x="31" y="92">writes stay in scope</text>
    <text class="small" x="31" y="121">large context stays pointed</text>
  </g>

  <g transform="translate(1054 145)">
    <path d="M13 10 C86 -4 204 2 286 11 C318 15 336 38 331 73 C323 124 342 174 311 201 C273 232 79 220 31 203 C5 194 -5 160 5 122 C16 79 -13 32 13 10 Z" fill="#d9f1cf"/>
