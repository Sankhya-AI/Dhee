<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 620" role="img" aria-labelledby="title desc">
  <title id="title">Dhee coding agent flow</title>
  <desc id="desc">Sketch flow from user task to context packet, coding agent, verification, and durable learning.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2 2 L10 6 L2 10" fill="none" stroke="#22272e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .paper { fill: #fffaf0; }
      .ink { stroke: #22272e; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; fill: none; }
      .thin { stroke: #22272e; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; fill: none; }
      .arrow { marker-end: url(#arrow); }
      .title { font: 700 42px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #22272e; }
      .label { font: 700 26px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #22272e; }
      .small { font: 500 18px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #48515c; }
      .tiny { font: 700 16px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #48515c; }
    </style>
  </defs>

  <rect class="paper" width="1500" height="620"/>
  <text class="title" x="63" y="78">What Dhee does beside a coding agent</text>
  <path class="thin" opacity=".14" d="M57 103 C259 79 449 116 633 94 C843 70 1006 113 1194 86 C1320 68 1411 82 1455 68"/>

